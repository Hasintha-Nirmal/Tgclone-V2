version: '3.8'

services:
  telegram-automation:
    build: .
    container_name: telegram-automation
    ports:
      - "8000:8000"
    volumes:
      # Persistent storage
      - ./sessions:/app/sessions
      - ./logs:/app/logs
      - ./data:/app/data
      # Temporary storage (not persisted)
      - telegram-downloads:/app/downloads
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - telegram-net

  # Optional: Redis for queue system
  redis:
    image: redis:7-alpine
    container_name: telegram-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - telegram-net
    profiles:
      - with-redis

  # Optional: PostgreSQL instead of SQLite
  postgres:
    image: postgres:15-alpine
    container_name: telegram-postgres
    environment:
      - POSTGRES_DB=telegram_automation
      - POSTGRES_USER=telegram
      - POSTGRES_PASSWORD=changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - telegram-net
    profiles:
      - with-postgres

volumes:
  telegram-downloads:  # Temporary, not persisted
  redis-data:
  postgres-data:

networks:
  telegram-net:
    driver: bridge
