version: '3.8'

# Production override configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  telegram-automation:
    # Production-specific settings
    environment:
      - LOG_LEVEL=WARNING
      - PYTHONOPTIMIZE=2
    # Stricter resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      # Restart policy for production
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    # Production logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Only expose necessary ports (no debug ports)
    ports:
      - "8000:8000"

  # Nginx reverse proxy for production
  nginx:
    image: nginx:1.25-alpine
    container_name: telegram-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - telegram-automation
    restart: unless-stopped
    networks:
      - telegram-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/run:size=10M
      - /var/cache/nginx:size=100M
      - /var/log/nginx:size=50M

  redis:
    # Production Redis configuration
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  postgres:
    # Production PostgreSQL configuration
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-telegram_automation}
      - POSTGRES_USER=${POSTGRES_USER:-telegram}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # Backup volume
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  telegram-downloads:
  redis-data:
  postgres-data:
  nginx-cache:
